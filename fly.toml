app = "hydra-node-fly"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  MAIN_HOST = "208.123.185.235"
  VLESS_PORT = "2005"
  NODE_NAME = "fly"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
